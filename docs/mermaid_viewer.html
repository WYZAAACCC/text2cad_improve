<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>generative_cad Architecture</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --text: #c9d1d9;
    --accent: #58a6ff; --border: #30363d; --hover: #1c2129;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; display:flex; height:100vh; }
  nav { width:280px; min-width:280px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; }
  nav h1 { padding:20px 20px 8px; font-size:15px; color:var(--accent); }
  nav .sub { padding:0 20px 16px; font-size:11px; color:#8b949e; }
  nav ul { list-style:none; overflow-y:auto; flex:1; padding:0; }
  nav li { padding:9px 20px; cursor:pointer; font-size:13px; border-left:3px solid transparent; color:#8b949e; }
  nav li:hover { background:var(--hover); color:#e6edf3; }
  nav li.on { background:rgba(88,166,255,0.08); border-left-color:var(--accent); color:var(--accent); font-weight:500; }
  main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  main .bar { padding:14px 24px; border-bottom:1px solid var(--border); background:var(--surface); display:flex; align-items:center; gap:8px; }
  main .bar h2 { font-size:14px; color:var(--accent); flex:1; }
  main .bar button { padding:4px 10px; border:1px solid var(--border); border-radius:4px; background:var(--bg); color:var(--text); font-size:11px; cursor:pointer; }
  main .bar button:hover { border-color:var(--accent); }
  main .bar .zoom { font-size:11px; color:#8b949e; margin-left:4px; }
  main .view { flex:1; overflow:auto; padding:20px 28px; display:flex; justify-content:center; background:var(--bg); }
  main .view svg { max-width:100%; height:auto; }
  .toast { position:fixed; bottom:20px; right:20px; background:#238636; color:#fff; padding:8px 16px; border-radius:6px; font-size:12px; opacity:0; transition:opacity .3s; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<nav>
  <h1>generative_cad</h1>
  <div class="sub">132 files, ~15k LOC</div>
  <ul id="nav"></ul>
</nav>
<main>
  <div class="bar">
    <h2 id="title"></h2>
    <button onclick="zoom(0.15)" title="Zoom in">+</button>
    <button onclick="zoom(-0.15)" title="Zoom out">-</button>
    <button onclick="zoom(0,true)" title="Reset">1:1</button>
    <button onclick="exportSVG()" title="Download SVG">SVG</button>
    <span class="zoom" id="zlabel">100%</span>
  </div>
  <div class="view" id="view"></div>
  <div class="toast" id="toast"></div>
</main>
<script>
mermaid.initialize({startOnLoad:false,theme:'dark',themeVariables:{
  primaryColor:'#1a3048',primaryTextColor:'#c9d1d9',primaryBorderColor:'#58a6ff',
  lineColor:'#484f58',secondaryColor:'#1c2840',tertiaryColor:'#161b22',
  background:'#0d1117',mainBkg:'#161b22',nodeBorder:'#58a6ff',
  clusterBkg:'#0d1117',clusterBorder:'#30363d',titleColor:'#58a6ff',
  edgeLabelBackground:'#0d1117',
},flowchart:{useMaxWidth:true,htmlLabels:true,curve:'basis'}});

const DIAGRAMS = [
{id:'context',title:'1. System Context'},
{id:'layers',title:'2. Pipeline Layers'},
{id:'dataflow',title:'3. Data Flow'},
{id:'validation',title:'4. Validation'},
{id:'compiler',title:'5. Compiler'},
{id:'dialects',title:'6. Dialects'},
{id:'authoring',title:'7. Authoring'},
{id:'runtime',title:'8. Runtime'},
{id:'spatial',title:'9. Spatial v6'},
{id:'deepseek',title:'10. DeepSeek Adapter'},
{id:'paths',title:'11. Two Paths'},
];

const DEFS = {
context:`graph LR
    User["User\\nNL text"] --> GCAD["generative_cad\\nText-to-CAD Engine"]
    GCAD --> STEP["output.step\\nISO 10303-21"]
    GCAD --> META["output.metadata.json\\nGenerativeMetadataV3"]
    STEP --> SW["SolidWorks 2025\\nnative_importers.py"]
    STEP --> NX["Siemens NX\\nnative_importers.py"]
    GCAD --> DS["DeepSeek API\\nv4-pro"]
    GCAD --> OCP["OCCT Kernel\\nCadQuery"]`,

layers:`graph TB
    subgraph L0["Entry"]
        builder["builder.py\\nbuild_generative_cad_model()"]
        tools["tools.py\\n9 Agent @tool functions"]
    end
    subgraph L1["Authoring"]
        bp["build_pipeline.py\\ngenerate_validate_build_step()"]
        ap["pipeline.py\\ngenerate_gcad_from_user_request()"]
        asm["raw_assembler.py\\nassemble_raw_gcad_document()"]
        fix["auto_fixer.py\\nauto_fix_with_report()"]
        ssch["strict_schema.py\\nto_deepseek_strict_schema()"]
    end
    subgraph L2["LLM Interaction"]
        orch["orchestrator.py\\nL1 + L2 prompt/tool builders"]
        dsc["deepseek_client.py\\nDeepSeekToolCaller"]
        tc["tool_schema_compiler.py\\nper-op JSON Schema"]
    end
    subgraph L3["IR"]
        raw["ir/raw.py\\nRawGcadDocument"]
        can["ir/canonical.py\\nCanonicalGcadDocument"]
        expr["ir/expr.py\\nDimExpr / RefPath"]
    end
    subgraph L4["Validation"]
        vp["validation/pipeline.py\\n14 stages"]
        vcan["canonicalize.py\\nRaw to Canonical"]
        rh["repair_hints.py\\nRepair hints"]
    end
    subgraph L5["Compiler Middle-End"]
        pm["pass_manager.py\\n2 Passes"]
        fp["fact_propagation.py\\nFactPropagation"]
        pl["planner.py\\nPlanning"]
    end
    subgraph L6["Dialects"]
        exec_d["executor.py\\nexecute_operation()"]
        reg["default_registry.py\\n6 dialects"]
        gutils["geometry_utils/\\nOCP wire/pipe/loft"]
    end
    subgraph L7["Runtime"]
        ctx["context.py\\nRuntimeContext"]
        store["object_store.py\\nObjectStore"]
        cq["cadquery_runtime.py\\nSTEP export"]
        rec["recovery.py\\nFailure recovery"]
        cs["constraint_resolver.py\\nPlacements"]
    end
    subgraph L8["Output"]
        run["pipeline/run.py\\nrun_canonical_gcad()"]
        art["artifact.py\\nCanonicalStepArtifact"]
        meta3["metadata_v3.py\\nMetadata proof"]
        gate["import_artifact.py\\nImport gate"]
    end
    builder --> vp
    builder --> run
    tools --> builder
    bp --> ap
    ap --> asm
    ap --> fix
    ap --> vp
    orch --> dsc
    orch --> tc
    dsc --> ssch
    asm --> reg
    vp --> vcan
    vp --> rh
    vcan --> reg
    pm --> fp
    pm --> pl
    fp --> expr
    exec_d --> reg
    run --> pm
    run --> reg
    run --> cs
    run --> cq
    cq --> gutils
    meta3 --> ctx
    art --> meta3
    gate --> meta3`,

dataflow:`graph LR
    A["1. User Text"] --> B["2. L1 Route\\norchestrator.py"]
    B --> C["3. DialectSelectionPlan\\nschemas.py"]
    C --> D["4. L2 Author\\norchestrator.py"]
    D --> E["5. RawGcadDocument\\nir/raw.py"]
    E --> F["6. System Fill\\nraw_assembler.py"]
    F --> G["7. Auto Fix\\nauto_fixer.py"]
    G --> H["8. Validate\\n14 stages"]
    H --> I["9. Canonicalize\\ncanonicalize.py"]
    I --> J["10. Compiler\\n2 passes"]
    J --> K["11. Execute\\ndialects/executor.py"]
    K --> L["12. Assemble\\ncomposition"]
    L --> M["13. Export STEP\\ncadquery_runtime.py"]
    M --> N["14. Metadata\\nmetadata_v3.py"]
    N --> O["output.step\\n+ metadata.json"]`,

validation:`graph TB
    subgraph Parse["ir/parse.py"]
        P1["Check top keys (10)"] --> P2["Check safety keys (7)"] --> P3["Check constraint keys (4)"] --> P4["model_validate()"]
    end
    subgraph RAW["RAW stages: validation/pipeline.py RAW_STAGES"]
        direction TB
        S1["structure\\nstructure.py"] --> S2["root_terminal\\nroot_terminal.py"]
        S2 --> S3["registry\\nregistry.py"]
        S3 --> S4["params\\nparams.py"]
        S4 --> S5["ownership\\nownership.py"]
        S5 --> S6["graph\\ngraph.py"]
        S6 --> S7["typecheck\\ntypecheck.py"]
        S7 --> S8["phase\\nphase.py"]
        S8 --> S9["composition\\ncomposition.py"]
        S9 --> S10["hole_semantics\\nhole_semantics.py"]
        S10 --> S11["safety\\nsafety.py"]
    end
    subgraph Canon["canonicalize.py"]
        CAN["canonicalize()\\ntype resolution + contract_hash + graph_hash"]
    end
    subgraph CSTAGES["CANONICAL stages"]
        C1["dialect_semantics\\ndialect_semantics.py"] --> C2["geometry_preflight\\ngeometry_preflight.py"]
    end
    subgraph Repair["Repair"]
        AF["auto_fixer.py\\n20+ deterministic fixes"]
        RA["repair_agent.py\\nLLM repair, max 3 rounds"]
        RH["repair_hints.py\\ndouble-bind detection"]
    end
    P4 --> RAW
    S11 --> CAN
    CAN --> CSTAGES
    RAW -.->|failure| AF
    RAW -.->|failure| RA
    RH --> AF
    RH --> RA
    CAN --> RH
    CSTAGES --> RH`,

compiler:`graph TB
    input["CanonicalGcadDocument\\nir/canonical.py"]
    gate["Gate: SEEKFLOW_GCAD_ENABLE_MIDDLE_END\\ncompiler/config.py, default=1"]
    subgraph Pass1["Pass 1: FactPropagationPass"]
        topo["Topological sort\\nKahn + DFS fallback"]
        process["Process each node"]
        rules["8 fact rules\\nanalysis/fact_rules.py"]
        eval["DimExpr eval\\nanalysis/expr_eval.py"]
        store["FactStore\\nanalysis/facts.py"]
    end
    subgraph Pass2["Pass 2: PlannerPass"]
        chk1["Pattern count vs\\nBATCH=8, LARGE=120"]
        chk2["Destructive ops\\nthreshold=32"]
        chk3["Edge treatment\\nordering"]
    end
    diag["CompilerModule.diagnostics\\nmodule.py"]
    report["PlanningReport\\nplanning_report.py"]
    input --> gate
    gate --> topo
    topo --> process
    process --> rules
    process --> eval
    eval --> store
    store --> process
    gate --> Pass2
    chk1 --> chk2 --> chk3
    Pass1 --> diag
    Pass2 --> report`,

dialects:`graph LR
    subgraph Registry
        DR["default_registry.py\\n@lru_cache singleton\\n6 frozen dialects"]
    end
    subgraph Executor
        EX["executor.py\\nexecute_operation()\\ncache->handler->normalize\\n->validate->BRepCheck"]
    end
    subgraph Dialects
        AX["axisymmetric\\n8 ops"]
        SE["sketch_extrude\\n11 ops"]
        LS["loft_sweep\\n4 ops"]
        SH["shell_housing\\n2 ops"]
        CP["composition\\n7 ops"]
        SP_d["sketch_profile\\n9 ops"]
    end
    subgraph GeoUtils["geometry_utils/"]
        W["ocp_wire.py\\nocp_pipe.py"]
        L["ocp_loft.py\\nocp_cylinder.py"]
        B["boolean_safe.py\\nboolean_batch.py"]
        H["hole_placement.py\\npath_analysis.py"]
    end
    subgraph Contracts
        BD["base.py\\nBaseDialect Protocol"]
        OS["operation.py\\nOperationSpec"]
        RES["results.py\\nOperationResult ABI"]
    end
    DR --> Dialects
    EX --> Dialects
    Dialects --> GeoUtils
    BD --> Dialects
    OS --> Dialects
    RES --> EX`,

authoring:`graph TB
    UT["User Text"] --> S0
    subgraph S0["Stage 0: Spatial (v6 optional)"]
        spa["spatial/pipeline.py\\nrun_spatial_authoring_frontend()"]
    end
    S0 --> S1
    subgraph S1["Stage 1: Route"]
        r1["LLM -> RoutePlan\\nschemas.py"]
    end
    S1 --> S2
    subgraph S2["Stage 2: Context"]
        c1["context_builder.py\\nload contracts + BasePackage"]
    end
    S2 --> S3
    subgraph S3["Stage 3: Feature Sequence"]
        f1["LLM -> FeatureSequenceDraft\\nschemas.py"]
    end
    S3 --> S4
    subgraph S4["Stage 4: Node Params (per-node)"]
        n1["LLM x N -> NodeParamsDraft\\nschemas.py"]
    end
    S4 --> S5
    subgraph S5["Stage 5: Assemble"]
        a1["raw_assembler.py\\nsystem fills safety/constraints/wiring"]
    end
    S5 --> S6
    subgraph S6["Stage 6: Validate"]
        v1["validation/pipeline.py\\n14 stages"]
    end
    S6 --> S7
    subgraph S7["Stage 7: Repair"]
        rp["auto_fixer.py + repair_agent.py\\ndeterministic + LLM loops"]
    end`,

runtime:`graph TB
    subgraph State["RuntimeContext (context.py)"]
        OS["ObjectStore\\nobject_store.py"]
        GH["GeometryHealth\\nhealth.py"]
        FR["handle_feature_failure()\\nrecovery.py"]
        PL["spatial_placements\\nconstraint_resolver.py"]
        SA["spatial_audit\\nspatial_audit.py"]
    end
    subgraph Handles["Typed Handles (handles.py)"]
        SOL["SolidHandle"]
        FRM["FrameHandle"]
        PLN["PlaneHandle"]
        PNT["PointHandle"]
        CRV["CurveHandle"]
        EDG["EdgeHandle"]
        FAC["FaceHandle"]
    end
    subgraph Backend["Geometry Backend"]
        CQ["CadQueryRuntime\\ncadquery_runtime.py"]
        CQ --> STEP["export_step()\\nOCCT STEPControl_Writer"]
    end
    subgraph Validate["Post-checks"]
        PC["postconditions.py"]
        GC["geometry_postcheck.py"]
        SC["semantic_postcheck.py"]
    end
    OS --> Handles
    GH --> OS
    FR --> OS
    PL --> OS
    SA --> PL
    Backend --> OS
    Validate --> OS`,

spatial:`graph TB
    subgraph PhaseA["Phase A: Symbolic (authoring/spatial/)"]
        OG["LLM: MechanicalObjectGraphDraft\\nprompts.py + schemas.py"]
        ARCH["Archetype matching\\narchetypes/ (4 types)"]
        CG["build_constraint_graph()\\nconstraint_graph.py"]
        SOLV["validate_constraint_graph()\\nsolver.py (cycle/contradiction)"]
        VAL["validate_spatial_contract()\\nvalidators.py (V001/V002/V003/V008)"]
        Q["plan_questions()\\nquestion_planner.py"]
    end
    subgraph PhaseC["Phase C: Numeric (runtime/)"]
        BB["measure_all_component_bboxes()\\nbbox_tracker.py"]
        RS["resolve_placements()\\nconstraint_resolver.py"]
        AUD["run_geometry_spatial_audit()\\nspatial_audit.py"]
    end
    subgraph Integration["Pipeline integration"]
        INJ["inject_placements_into_sequence()\\nintegration.py"]
        CTX["build_spatial_context_for_prompt()\\nintegration.py"]
    end
    OG --> ARCH
    ARCH --> CG
    CG --> SOLV
    SOLV --> VAL
    VAL --> Q
    CG --> INJ
    INJ --> PhaseC
    BB --> RS
    RS --> AUD
    CG --> CTX`,

deepseek:`graph TB
    IN["call_strict_tool()\\ndeepseek_client.py"]
    subgraph Transform["strict_schema.py"]
        T1["_inline_all_refs()"]
        T2["_transform_object()\\naddProps=false, number->integer\\noptional->anyOf[type,null]"]
        T3["_strip_unsupported()\\nminLength/maxLength/minItems..."]
        T4["_fix_anyof_items()"]
    end
    subgraph Config["API workarounds"]
        W1["strict=False (#1069)"]
        W2["tool_choice=required (#1376)"]
        W3["thinking=disabled"]
    end
    subgraph Validate["Response checks"]
        V1["not empty"]
        V2["exactly 1 call"]
        V3["name matches"]
        V4["valid JSON"]
        V5["is dict"]
    end
    OUT["ToolCallResult\\nprovider.py"]
    IN --> T1 --> T2 --> T3 --> T4
    T4 --> W1
    IN --> Config
    Config --> V1 --> V2 --> V3 --> V4 --> V5
    V5 --> OUT`,

paths:`graph LR
    subgraph P["Primitive (deterministic)"]
        direction LR
        P1["Structured Spec"] --> P2["L1: deterministic_primitive"] --> P3["geometry_primitives\\n(external package)"] --> P4["STEP"]
    end
    subgraph NP["Non-Primitive (LLM + Compiler)"]
        direction LR
        N1["NL Text"] --> N2["L1 Route\\nDeepSeek"] --> N3["L2 Author\\nDeepSeek"] --> N4["14-stage\\nValidate"] --> N5["Compiler\\n2 passes"] --> N6["6 Dialects\\nExecute"] --> N7["STEP"]
    end`
};

let cur = 0, z = 1.0;
function build() {
  const list = document.getElementById('nav');
  DIAGRAMS.forEach((d,i) => {
    const li = document.createElement('li');
    li.textContent = d.title;
    li.onclick = () => show(i);
    li.id = 'nav-' + d.id;
    list.appendChild(li);
  });
  show(0);
}
async function show(i) {
  cur = i; const d = DIAGRAMS[i];
  document.getElementById('title').textContent = d.title;
  document.querySelectorAll('#nav li').forEach((li,j) => li.classList.toggle('on', j===i));
  const view = document.getElementById('view');
  const id = 'm-' + d.id;
  view.innerHTML = `<div class="mermaid" id="${id}">${DEFS[d.id]}</div>`;
  try {
    await mermaid.run({nodes:[document.getElementById(id)]});
    applyZ();
  } catch(e) { view.innerHTML = `<pre style="color:#f85149;padding:20px">${e.message}\n\n${e.stack||''}</pre>`; }
}
function applyZ() {
  const svg = document.querySelector('#view svg');
  if (svg) { svg.style.transform = `scale(${z})`; svg.style.transformOrigin = 'top left'; }
  document.getElementById('zlabel').textContent = Math.round(z*100)+'%';
}
function zoom(d,reset) { z = reset ? 1.0 : Math.max(0.3, Math.min(3.0, z+d)); applyZ(); }
async function exportSVG() {
  const svg = document.querySelector('#view svg');
  if (!svg) return;
  const clone = svg.cloneNode(true);
  clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
  const blob = new Blob([new XMLSerializer().serializeToString(clone)],{type:'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = DIAGRAMS[cur].id+'.svg';
  a.click();
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown') { e.preventDefault(); show(Math.min(DIAGRAMS.length-1, cur+1)); }
  if (e.key === 'ArrowUp') { e.preventDefault(); show(Math.max(0, cur-1)); }
  if (e.key === '=' || e.key === '+') { e.preventDefault(); zoom(0.15); }
  if (e.key === '-') { e.preventDefault(); zoom(-0.15); }
  if (e.key === '0') { e.preventDefault(); zoom(0,true); }
});
build();
</script>
</body>
</html>
