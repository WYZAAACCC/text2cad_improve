rules:
  - rule_id: fir_tree.check.no_24_point_template
    severity: heuristic
    statement: >
      自检: 避免无工程语义地机械套用固定24点折线模板。如果 add_polyline 的
      points 数组恰好包含24个点且其中12个Y≥0、12个Y≤0，应要求额外验证：
      是否区分了工作面/非工作面、是否使用了显式圆弧替代尖角、
      是否有独立的 M_B1~M_B4 半径。
      24点本身不一定是错误，错误的是缺乏专业语义地机械套用。
    applies_to: [fir_tree_groove]

  - rule_id: fir_tree.check.distinct_arc_semantics
    severity: hard
    statement: >
      自检: M_B1~M_B4 是否作为四个独立语义参数存在(各自有独立的 parameter key)？
      如果四个圆弧被合并为一个变量或自动绑定，说明LLM未正确区分四类工程圆弧。
      数值相等本身不违规(用户可显式指定相同值)，但语义合并违规。
    applies_to: [fir_tree_groove]

  - rule_id: fir_tree.check.no_uniform_fillet
    severity: hard
    statement: >
      自检: 不得出现对全部内部顶点使用同一 radius_mm 的 fillet_sketch 调用。
    applies_to: [fir_tree_groove]

  - rule_id: fir_tree.check.working_vs_nonworking
    severity: strong_preference
    statement: >
      自检: 是否区分了工作面和被工作面？如果所有齿侧面使用相同角度，
      说明M_A2(齿形角)和M_A3(压力角)的语义可能被混淆。
    applies_to: [fir_tree_groove]

  - rule_id: fir_tree.check.no_hardcoded_params
    severity: hard
    statement: >
      自检: 槽数、阵列半径、拉伸深度不得硬编码为固定值。
      circular_pattern_component 的 count 参数应来自 MM_N，
      radius_mm 应来自 M_R1。
    applies_to: [fir_tree_groove]
