# KT787 Fir-Tree Groove Construction Strategy
# This is guidance for the LLM, NOT deterministic code.

## Coordinate System

- sketch plane: XY
- origin: groove mouth center on rim surface
- +X: radial inward, from rim toward disc center (slot depth direction)
- +Y: tangential (half-width direction)
- groove centerline: Y = 0
- slot depth values: X >= 0 (positive going inward)

## Construction Sequence

1. **Local coordinate system**: origin at rim surface on groove centerline

2. **Build ONE SIDE only** (right half, Y >= 0):
   - Start at mouth: (0, mouth_half_width)
   - Draw upper working flank (inclined, pressure angle M_A3)
   - Draw upper tooth tip arc (radius M_B4)
   - Draw upper non-working flank (inclined, tooth form angle M_A2)
   - Draw inter-tooth root arc (radius M_B3)
   - Draw lower working flank
   - Draw lower tooth tip arc (radius M_B2)
   - Draw lower non-working flank
   - Draw bottom transition arc (radius M_B1)
   - Close to centerline (Y=0) at groove root depth (X = groove_depth_mm)

3. **Mirror**: `mirror_profile(axis="X")` to get left half (Y <= 0).
   Mirroring about X axis maps +Y to -Y while preserving X (depth) coordinates.

4. **Close**: `close_profile()`

5. **3D cutting**:
   - If MM_A (broach angle) is non-zero: rotate the cutter or its extrusion
     direction by MM_A relative to the disc meridian plane.
     Do NOT use an un-rotated straight slot cutter when MM_A != 0.
   - Extrude: `extrude_profile(depth_mm=<rim_thickness>, direction="both")`

6. **Pattern**:
   - `circular_pattern_component(count=MM_N, rotate_copies=True)`
   - NOTE: M_R1 is the first-tooth pitch-line reference radius (from disc axis).
     The pattern radius should be derived from M_R1 and the local origin offset.
     Do NOT directly use M_R1 as the pattern radius_mm without deriving the
     relationship between the pitch-line radius and the cutter local origin.

7. **Boolean**: `boolean_cut(target=disc_body, tool=patterned_cutters)`

## Key Principles

- Build explicit arcs (add_arc_segment) for R1~R4, NOT post-hoc filleting of sharp corners
- LLM calculates control points, tangency points, and arc centers based on engineering parameters
- fillet_sketch@2.0.0 should only be used for non-design-profile transition radii
- Each arc class (M_B1~M_B4) gets its own independent radius
- Working vs non-working flanks must be distinguishable
- MM_A controls broach orientation — do not ignore it
- MM_N controls pattern count — do not hardcode to 60
