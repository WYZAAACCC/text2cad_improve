solidworks2025:
  software: solidworks
  version: "2025"
  units_api: m
  units_ir: mm
  stable_recipes:
    - box
    - flanged_hub
    - spur_gear
  stable_primitives:
    - involute_spur_gear
  primitive_strategy:
    involute_spur_gear: cadquery_step_import
  experimental_features:
    - cut_extrude
    - fillet
  exports:
    - sldprt
    - step
  caveats:
    - "Complex features must go through strict VBS recipe wrappers."
    - "Do not call FeatureExtrusion2 directly from LLM-generated Python."
    - "Gear primitives are imported via canonical STEP (cadquery_step_import strategy)."

nx12:
  software: nx
  version: "12.0"
  units_api: mm
  units_ir: mm
  stable_recipes:
    - box
    - block_with_hole
    - l_bracket
    - stepped_block
  stable_primitives:
    - involute_spur_gear
  primitive_strategy:
    involute_spur_gear: cadquery_step_import
  exports:
    - prt
    - step
  caveats:
    - "NXOpen must run inside NX bridge journal."
    - "External Python submits JSON jobs only."
    - "Gear primitives are imported via canonical STEP (cadquery_step_import strategy)."

ansys181:
  software: ansys
  version: "18.1"
  units_ir: "mm,N,MPa"
  stable_templates:
    - static_cantilever_beam_rect
    - plate_with_hole_tension
    - beam_thermal
    - cantilever_modal
    - buckling_column
    - bilinear_plastic
  caveats:
    - "Use APDL batch only."
    - "Do not use PyMAPDL gRPC for ANSYS 18.1."

cadquery:
  software: cadquery
  units_ir: mm
  stable_recipes:
    - box
    - cylinder
    - block_with_hole
    - l_bracket
    - stepped_block
    - flanged_hub
    - spur_gear
    - shaft_basic
    - shaft_with_keyway
  stable_primitives:
    - involute_spur_gear
  primitive_strategy:
    involute_spur_gear: native_cadquery_primitive
  exports:
    - step
    - stl
  caveats:
    - "No native SolidWorks or NX feature tree."
